name: Seed STO Stops

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  seed-sto-stops:
    runs-on: ubuntu-latest
    steps:
      - name: Download STO GTFS
        run: |
          curl -L -o gtfs_sto.zip "https://contenu.sto.ca/GTFS/GTFS.zip"
          unzip -o gtfs_sto.zip stops.txt

      - name: Parse stops and upsert to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const lines = fs.readFileSync('stops.txt', 'utf8').trim().split('\n');
          const headers = lines[0].split(',').map(h => h.replace(/\"/g, '').trim());
          const idIdx = headers.indexOf('stop_id');
          const nameIdx = headers.indexOf('stop_name');
          const latIdx = headers.indexOf('stop_lat');
          const lonIdx = headers.indexOf('stop_lon');

          const stops = [];
          for (let i = 1; i < lines.length; i++) {
            // Handle CSV with possible quoted fields
            const row = lines[i].match(/(?:\"[^\"]*\"|[^,]*)(?:,|$)/g) || [];
            const clean = row.map(v => v.replace(/,\$/, '').replace(/^\"|\"$/g, '').trim());
            const id = clean[idIdx];
            const name = clean[nameIdx];
            const lat = parseFloat(clean[latIdx]);
            const lon = parseFloat(clean[lonIdx]);
            if (id && name && !isNaN(lat)) {
              stops.push({ stop_id: id, name, lat, lon, agency: 'STO' });
            }
          }

          console.log('Parsed ' + stops.length + ' STO stops');

          // Batch upsert in chunks of 500
          const CHUNK = 500;
          (async () => {
            for (let i = 0; i < stops.length; i += CHUNK) {
              const chunk = stops.slice(i, i + CHUNK);
              const resp = await fetch(process.env.SUPABASE_URL + '/rest/v1/stops', {
                method: 'POST',
                headers: {
                  'apikey': process.env.SUPABASE_SERVICE_KEY,
                  'Authorization': 'Bearer ' + process.env.SUPABASE_SERVICE_KEY,
                  'Content-Type': 'application/json',
                  'Prefer': 'resolution=merge-duplicates'
                },
                body: JSON.stringify(chunk)
              });
              if (!resp.ok) {
                const text = await resp.text();
                console.error('Upsert error chunk ' + i + ': ' + resp.status + ' ' + text);
                process.exit(1);
              }
              console.log('Upserted chunk ' + (i / CHUNK + 1) + ' (' + chunk.length + ' stops)');
            }
            console.log('Done — ' + stops.length + ' STO stops seeded');
          })();
          "
