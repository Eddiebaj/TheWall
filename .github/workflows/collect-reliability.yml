name: Collect Route Reliability

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install script dependencies
        run: cd scripts && npm install
      - name: Collect reliability data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OC_TRANSPO_API_KEY: ${{ secrets.OC_TRANSPO_API_KEY }}
          STO_API_KEY: ${{ secrets.STO_API_KEY }}
          STO_PRIVATE_KEY: ${{ secrets.STO_PRIVATE_KEY }}
        run: node scripts/collect-reliability.js
